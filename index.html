<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BATCOMPUTER // GERROS</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#020804;
  --panel:#030d06;
  --border:#0a3018;
  --border-bright:#0d5025;
  --green:#00ff88;
  --green-dim:#00aa55;
  --green-faint:#003311;
  --cyan:#00ffee;
  --yellow:#f0b429;
  --yellow-dim:#996b00;
  --red:#ff3a2f;
  --orange:#ff8c00;
  --text:#00dd77;
  --muted:#005533;
  --font:'Share Tech Mono','Courier New',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;overflow-x:hidden}

/* Scanlines */
body::after{
  content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.12) 2px,rgba(0,0,0,0.12) 4px);
  pointer-events:none;z-index:9999;
}

body{text-shadow:0 0 6px rgba(0,255,136,0.25)}

.wrapper{
  max-width:1700px;margin:0 auto;padding:10px;
  display:flex;flex-direction:column;gap:8px;min-height:100vh;
}

/* ── HEADER ── */
.header{
  display:grid;grid-template-columns:auto 1fr auto;
  align-items:center;gap:16px;padding:14px 20px;
  border:1px solid var(--border-bright);background:var(--panel);
  position:relative;overflow:hidden;
}
.header::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(0,255,136,0.03),transparent);
  animation:sweep 5s linear infinite;
}
@keyframes sweep{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}

.bat-logo{font-size:40px;filter:drop-shadow(0 0 12px rgba(240,180,41,0.9));animation:batpulse 3s ease-in-out infinite}
@keyframes batpulse{0%,100%{filter:drop-shadow(0 0 12px rgba(240,180,41,0.9))}50%{filter:drop-shadow(0 0 24px rgba(240,180,41,1))}}

.header-center{text-align:center}
.header-title{
  font-size:clamp(30px,5vw,58px);font-weight:900;
  color:var(--green);letter-spacing:0.35em;
  text-shadow:0 0 20px rgba(0,255,136,0.9),0 0 50px rgba(0,255,136,0.4),0 0 80px rgba(0,255,136,0.2);
  animation:flicker 12s infinite;
}
@keyframes flicker{0%,94%,96%,98%,100%{opacity:1}95%{opacity:0.7}97%{opacity:0.85}99%{opacity:0.6}}

.header-sub{font-size:12px;letter-spacing:0.22em;color:var(--muted);margin-top:5px}
.header-greeting{font-size:13px;letter-spacing:0.12em;color:var(--green-dim);margin-top:2px}

.header-status{display:flex;flex-direction:column;align-items:flex-end;gap:5px}
.status-row{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--green-dim)}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:blink 2s ease-in-out infinite}
.dot.yellow{background:var(--yellow);box-shadow:0 0 6px var(--yellow);animation-delay:.6s}
.dot.red{background:var(--red);box-shadow:0 0 6px var(--red);animation-delay:1.2s}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.25}}

/* ── TICKER ── */
.ticker-wrap{
  overflow:hidden;border:1px solid var(--border);
  padding:5px 10px;background:rgba(0,0,0,0.4);
  font-size:12px;color:var(--muted);
}
.ticker-inner{white-space:nowrap;animation:ticker 45s linear infinite}
@keyframes ticker{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}

/* ── LAYOUT ── */
.dashboard{display:grid;grid-template-columns:2fr 1fr;gap:8px;flex:1}
.bottom-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

/* ── PANEL ── */
.panel{
  border:1px solid var(--border-bright);background:var(--panel);
  display:flex;flex-direction:column;overflow:hidden;position:relative;
}
.panel::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--green),transparent);
  opacity:0.4;
}
.panel-header{
  padding:7px 12px;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
  background:rgba(0,255,136,0.03);
}
.panel-title{font-size:13px;letter-spacing:0.14em;color:var(--yellow);text-shadow:0 0 8px rgba(240,180,41,0.4)}
.panel-badge{font-size:11px;padding:2px 6px;border:1px solid var(--border-bright);color:var(--green-dim);letter-spacing:0.08em}
.panel-badge.alert-badge{color:var(--red);border-color:rgba(255,58,47,0.5)}

/* ── TABS ── */
.tabs{display:flex;border-bottom:1px solid var(--border);background:rgba(0,0,0,0.3)}
.tab{
  padding:5px 10px;font-size:12px;letter-spacing:0.08em;
  color:var(--muted);cursor:pointer;border-right:1px solid var(--border);
  transition:all 0.15s;user-select:none;
}
.tab:hover{color:var(--green-dim);background:rgba(0,255,136,0.03)}
.tab.active{color:var(--green);background:rgba(0,255,136,0.05);border-bottom:2px solid var(--green)}
.tab-content{display:none;flex:1;overflow:hidden;flex-direction:column}
.tab-content.active{display:flex}

/* ── PANEL BODY ── */
.panel-body{flex:1;padding:10px 12px;overflow-y:auto;display:flex;flex-direction:column;gap:7px}
.panel-body::-webkit-scrollbar{width:3px}
